- type: entity
  parent: [ SimpleMobBase, MobCombat ]
  id: BaseMobRot
  name: cyst-like outgrowth
  description: A lifeless husk of rotting flesh, animated through blind hunger.
  abstract: true
  components:
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NPCImprintingOnSpawnBehaviour
    spawnFriendsSearchRadius: 10
    whitelist:
      components:
      - Anomaly # Friendly to inner anomaly host
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Tag
    tags:
    - DoorBumpOpener
    - Flesh
    - Rot
  - type: Sprite
    drawdepth: Mobs
    sprite: Mobs/Aliens/flesh.rsi
  - type: RotTendrilVisual
  - type: MovementAlwaysTouching
  - type: MovementSpeedModifier
    baseWalkSpeed: 0.7
    baseSprintSpeed: 1.2
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
  - type: Stamina
    critThreshold: 200
    animationThreshold: 100
  - type: Butcherable
    spawned:
    - id: FoodMeatRotten
      amount: 1
  - type: CombatMode
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 6
  - type: ReplacementAccent
    accent: genericAggressive

# Proto Long Legs (small hearing, short grapple)
- type: entity
  parent: BaseMobRot
  id: MobRotProtoLongLegs
  name: proto long legs
  description: A nascent rot creature feeling its way through sound.
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: jared
  - type: DamageStateVisuals
    states:
      Alive:
        Base: jared
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: RotGrapple
    grappleRange: 2
    resistSeconds: 1
  - type: ActionGrant
    actions:
    - ActionRotTendril

